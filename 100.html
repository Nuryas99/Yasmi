<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Регулярные выражения</title>
</head>
<body>

<h2>Результаты заданий</h2>

<p id="task1"></p>
<p id="task2"></p>
<p id="task3"></p>

<script>
let str = 'aa aba abba abbba abbbba abbbbba';

// №1
let res1 = str.match(/ab{2,4}a/g);
document.getElementById("task1").innerHTML =
"№1: " + res1;

// №2
let res2 = str.match(/ab{1,3}a/g);
document.getElementById("task2").innerHTML =
"№2: " + res2;

// №3
let res3 = str.match(/ab{4,}a/g);
document.getElementById("task3").innerHTML =
"№3: " + res3;
</script>

</body>
</html>
